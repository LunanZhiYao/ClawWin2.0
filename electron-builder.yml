appId: cn.openclaw.desktop
productName: "鲁南千易"
copyright: Copyright © 2026 鲁南制药集团股份有限公司
directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - electron/screenshot.html

extraResources:
  - from: bundled/node/
    to: bundled/node/
    filter:
      - "**/*"
  - from: bundled/openclaw/
    to: bundled/openclaw/
    filter:
      - "**/*"
  - from: bundled/agent-browser/
    to: bundled/agent-browser/
    filter:
      - "**/*"
  - from: assets/icon.ico
    to: assets/icon.ico

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  artifactName: "LunanQianyi-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  language: "2052"
  include: installer/installer.nsh
  perMachine: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "鲁南千易"
  runAfterFinish: true
  allowElevation: false
